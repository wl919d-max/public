<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>入库标签打印原型</title>
  <style>
    :root {
      --blue: #075bd8;
      --blue-soft: #eaf2ff;
      --green: #07875e;
      --green-soft: #e7f7f0;
      --orange: #d97706;
      --orange-soft: #fff5df;
      --red: #e54835;
      --ink: #172b4d;
      --muted: #6b7890;
      --line: #dfe4ec;
      --line-soft: #edf0f4;
      --canvas: #f6f8fb;
      --surface: #fff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--canvas);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
      font-size: 14px;
      font-weight: 400;
      line-height: 1.5;
      letter-spacing: 0;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(#fff, #fff) 20px 18px / calc(100% - 40px) 58px no-repeat,
        linear-gradient(#fff, #fff) 20px 92px / calc(100% - 40px) 48px no-repeat,
        linear-gradient(#fff, #fff) 20px 156px / calc(100% - 40px) 190px no-repeat,
        linear-gradient(#fff, #fff) 20px 362px / calc(100% - 40px) 250px no-repeat,
        var(--canvas);
    }

    button, input, select { font: inherit; }
    button { cursor: pointer; }

    .dialog-backdrop {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      background: rgba(24, 37, 58, 0.46);
    }

    .app {
      display: grid;
      grid-template-rows: 66px 48px minmax(0, 1fr) 62px;
      width: 1060px;
      max-width: calc(100vw - 32px);
      height: calc(100vh - 64px);
      max-height: calc(100vh - 64px);
      overflow: hidden;
      border: 1px solid #cfd6e1;
      border-radius: 16px;
      background: var(--surface);
      box-shadow: 0 18px 54px rgba(20, 36, 60, 0.24);
    }

    .app.preview-mode {
      grid-template-rows: 66px 48px minmax(0, 1fr) auto;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 0 20px;
      border-bottom: 1px solid var(--line);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-icon {
      display: grid;
      place-items: center;
      width: 40px;
      height: 40px;
      border-radius: 12px;
      color: var(--blue);
      background: var(--blue-soft);
      font-size: 20px;
      font-weight: 700;
    }

    .brand h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      line-height: 1.25;
    }

    .brand p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 400;
      line-height: 1.4;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .entry-switch {
      display: flex;
      border: 1px solid #b9c6d8;
      border-radius: 4px;
      overflow: hidden;
    }

    .entry-switch button {
      min-height: 28px;
      padding: 0 10px;
      border: 0;
      border-right: 1px solid #b9c6d8;
      color: #53627a;
      background: var(--surface);
      font-size: 12px;
      font-weight: 500;
    }

    .entry-switch button:last-child { border-right: 0; }
    .entry-switch button.active { color: var(--blue); background: var(--blue-soft); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 32px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 4px;
      color: var(--ink);
      background: var(--surface);
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
    }

    .btn:hover { border-color: #aeb9c8; }

    .btn-primary {
      border-color: var(--blue);
      color: #fff;
      background: var(--blue);
    }

    .btn-quiet {
      border-color: transparent;
      color: var(--muted);
      background: transparent;
    }

    .icon-only {
      width: 32px;
      padding: 0;
      font-size: 18px;
    }

    .mode-switch {
      display: flex;
      border: 1px solid var(--line);
      border-radius: 4px;
      overflow: hidden;
    }

    .mode-switch button {
      min-height: 28px;
      padding: 0 10px;
      border: 0;
      border-right: 1px solid var(--line);
      color: #53627a;
      background: var(--surface);
      font-size: 12px;
      font-weight: 500;
    }

    .mode-switch button:last-child { border-right: 0; }
    .mode-switch button.active { color: #fff; background: var(--blue); }

    .stepbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 20px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfe;
    }

    .steps {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .step {
      min-width: 110px;
      height: 32px;
      border: 1px solid var(--line);
      border-radius: 4px;
      color: var(--muted);
      background: var(--surface);
      font-size: 14px;
      font-weight: 500;
    }

    .step.active {
      border-color: #b8c7de;
      color: var(--ink);
      background: #f8faff;
    }

    .step.done {
      border-color: #c8dcff;
      color: var(--blue);
      background: var(--blue-soft);
    }

    .arrow { color: #a4afbd; font-size: 18px; }

    .selection-summary {
      color: var(--muted);
      font-size: 12px;
    }

    .selection-summary strong { color: var(--ink); }
    .text-danger { color: var(--red); }

    .workspace {
      display: grid;
      grid-template-columns: 380px minmax(0, 1fr);
      min-height: 0;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      min-width: 0;
      border-right: 1px solid var(--line);
      background: #fbfcfe;
    }

    .source-head {
      padding: 14px;
      border-bottom: 1px solid var(--line);
    }

    .source-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .source-card {
      padding: 12px;
      border: 1px solid #bfd2ef;
      border-radius: 6px;
      background: var(--surface);
    }

    .source-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .source-card strong { font-size: 15px; }

    .source-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 12px;
      margin-top: 7px;
      color: var(--muted);
      font-size: 12px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 0 7px;
      border-radius: 3px;
      color: var(--green);
      background: var(--green-soft);
      font-size: 12px;
      font-weight: 500;
    }

    .sidebar-tools {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
    }

    .search {
      flex: 1;
      min-width: 0;
      height: 34px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 4px;
      outline: none;
    }

    .search:focus,
    input:focus,
    select:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 2px rgba(7, 91, 216, 0.1);
      outline: none;
    }

    .material-list {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 10px 14px 82px;
    }

    .material-card {
      margin-bottom: 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--surface);
    }

    .material-card.selected { border-color: #9ec1fa; }

    .order-card {
      margin-bottom: 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--surface);
    }

    .order-card.selected { border-color: #9ec1fa; }

    .order-head {
      display: grid;
      grid-template-columns: 22px minmax(0, 1fr) auto;
      gap: 8px;
      align-items: start;
      padding: 11px 12px;
    }

    .order-head strong {
      display: block;
      margin-bottom: 4px;
      font-weight: 600;
    }

    .order-head span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .order-count {
      min-width: 48px;
      padding: 3px 7px;
      border-radius: 3px;
      color: #53627a;
      background: #f1f4f8;
      text-align: center;
      font-size: 12px;
    }

    .order-materials {
      border-top: 1px solid var(--line-soft);
      background: #fafbfd;
    }

    .order-material-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      padding: 8px 12px 8px 42px;
      border-bottom: 1px solid var(--line-soft);
      font-size: 12px;
    }

    .order-material-row:last-child { border-bottom: 0; }

    .order-material-row span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .order-material-row strong {
      color: var(--blue);
      font-weight: 600;
    }

    .material-main {
      display: grid;
      grid-template-columns: 22px minmax(0, 1fr);
      gap: 8px;
      padding: 12px;
    }

    input[type="checkbox"] {
      width: 16px;
      height: 16px;
      margin: 2px 0 0;
      accent-color: var(--blue);
    }

    .material-name {
      margin-bottom: 4px;
      font-size: 12px;
      font-weight: 600;
    }

    .material-code {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .material-stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      border-top: 1px solid var(--line-soft);
      background: #fafbfd;
    }

    .stat {
      padding: 8px 10px;
      border-right: 1px solid var(--line-soft);
    }

    .stat:last-child { border-right: 0; }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 11px;
    }

    .stat strong {
      display: block;
      margin-top: 3px;
      font-size: 13px;
      font-weight: 600;
    }

    .material-print {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 100px;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      border-top: 1px solid var(--line-soft);
    }

    .print-rule {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .qty-input {
      width: 100%;
      height: 34px;
      padding: 0 9px;
      border: 1px solid #cfd7e3;
      border-radius: 4px;
      text-align: right;
      font-size: 12px;
      font-weight: 500;
    }

    .content {
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
      background: var(--canvas);
    }

    .content-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 54px;
      padding: 8px 16px;
      border-bottom: 1px solid var(--line);
      background: var(--surface);
    }

    .preview-summary {
      align-items: center;
      gap: 12px;
      color: #5e6c84;
      font-size: 12px;
    }

    .preview-summary .divider { color: #dfe1e6; }
    .preview-summary strong { color: var(--ink); }

    .toolbar-group {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .toolbar-label {
      margin-right: 2px;
      color: var(--muted);
      font-size: 12px;
    }

    .size-btn {
      height: 32px;
      padding: 0 11px;
      border: 1px solid var(--line);
      border-radius: 4px;
      color: #53627a;
      background: var(--surface);
      font-size: 12px;
      font-weight: 400;
    }

    .size-btn.active {
      border-color: var(--blue);
      color: var(--blue);
      background: var(--blue-soft);
    }

    .zoom {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .zoom .btn {
      width: 24px;
      min-height: 24px;
      height: 24px;
      padding: 0;
      border-radius: 4px;
      font-size: 14px;
    }

    .zoom strong {
      width: 42px;
      color: #42526e;
      text-align: center;
      font-size: 12px;
    }

    .canvas {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 20px;
    }

    .selection-panel {
      width: min(920px, 100%);
      margin: 0 auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 50px;
      padding: 0 16px;
      border-bottom: 1px solid var(--line);
    }

    .panel-head h2 {
      margin: 0;
      font-size: 14px;
      font-weight: 600;
    }

    #selectedMaterialList {
      display: grid;
      gap: 8px;
      padding: 10px 12px;
    }

    .selected-material {
      display: grid;
      grid-template-columns: 100px minmax(0, 1fr) 120px 32px;
      gap: 10px;
      align-items: center;
      min-width: 0;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
    }

    .mini-label {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100px;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fafafa;
    }

    .mini-label .barcode {
      width: 82px;
      height: 22px;
    }

    .mini-label .barcode::after {
      top: 24px;
      font-size: 6px;
    }

    .barcode {
      position: relative;
      width: 84px;
      height: 26px;
      background:
        repeating-linear-gradient(
          90deg,
          #111 0 2px,
          transparent 2px 4px,
          #111 4px 5px,
          transparent 5px 8px,
          #111 8px 11px,
          transparent 11px 13px
        );
    }

    .barcode::after {
      content: attr(data-code);
      position: absolute;
      top: 29px;
      left: 50%;
      color: #222;
      font-size: 7px;
      white-space: nowrap;
      transform: translateX(-50%);
    }

    .selected-name strong {
      display: block;
      overflow: hidden;
      margin-bottom: 3px;
      font-size: 12px;
      font-weight: 600;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .selected-name {
      min-width: 0;
    }

    .selected-name span {
      display: block;
      overflow: hidden;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .selected-material input {
      width: 100%;
      height: 30px;
      padding: 0 9px;
      border: 1px solid #cfd7e3;
      border-radius: 4px;
      text-align: center;
      font-size: 12px;
      font-weight: 500;
    }

    .remove {
      width: 32px;
      height: 32px;
      border: 0;
      color: #9aa6b6;
      background: transparent;
      font-size: 15px;
    }

    .empty {
      padding: 60px 20px;
      text-align: center;
      color: var(--muted);
    }

    .preview-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
      width: 100%;
      margin: 0 auto;
      transform-origin: top center;
    }

    .label-card {
      position: relative;
      flex: 0 0 288px;
      width: 288px;
      height: 192px;
      overflow: hidden;
      border: 1px solid #dfe1e6;
      border-radius: 4px;
      background: var(--surface);
      box-shadow: 0 1px 3px rgba(30, 47, 71, 0.12);
    }

    .qr {
      width: 74px;
      height: 74px;
      border: 5px solid #111;
      background:
        linear-gradient(90deg, #111 12%, transparent 12% 24%, #111 24% 36%, transparent 36% 48%, #111 48% 60%, transparent 60% 72%, #111 72% 84%, transparent 84%),
        linear-gradient(#111 12%, transparent 12% 24%, #111 24% 36%, transparent 36% 48%, #111 48% 60%, transparent 60% 72%, #111 72% 84%, transparent 84%);
      background-size: 19px 19px;
    }

    .label-name,
    .label-unit,
    .label-extra {
      position: absolute;
      left: 10px;
      width: 268px;
      overflow: hidden;
      color: var(--ink);
      text-align: center;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .label-name {
      top: 36px;
      height: 24px;
      font-size: 13px;
      line-height: 24px;
    }

    .label-qr {
      position: absolute;
      top: 67px;
      left: 14px;
      width: 77px;
      height: 77px;
    }

    .label-barcode {
      position: absolute;
      top: 72px;
      left: 94px;
      width: 182px;
      height: 39px;
    }

    .label-barcode::after {
      top: 41px;
      font-size: 9px;
    }

    .label-unit {
      top: 127px;
      height: 24px;
      font-size: 12px;
      line-height: 24px;
    }

    .label-extra {
      top: 154px;
      height: 22px;
      color: #6b778c;
      font-size: 10px;
      line-height: 22px;
    }

    .preview-only { display: none !important; }
    .app.preview-mode .selection-only { display: none; }
    .app.preview-mode .preview-only { display: flex !important; }
    .app.preview-mode .preview-grid.preview-only { display: flex !important; }
    .app.preview-mode .workspace { grid-template-columns: minmax(0, 1fr); }
    .app.preview-mode .sidebar { display: none; }
    .app.preview-mode .content-toolbar {
      min-height: 44px;
      padding: 9px 20px;
    }
    .app.preview-mode .canvas {
      padding: 24px;
      background: #f4f5f7;
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 20px;
      border-top: 1px solid var(--line);
      background: var(--surface);
    }

    .preview-footer {
      min-width: 0;
      flex-direction: column;
      border-top: 1px solid var(--line);
      background: var(--surface);
    }

    .preview-config {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px 12px;
      padding: 10px 20px;
      background: #fafbfc;
    }

    .config-group,
    .channel-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .config-label {
      color: #5e6c84;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }

    .config-divider {
      width: 1px;
      height: 18px;
      background: var(--line);
    }

    .footer-info {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .footer-info strong {
      font-size: 14px;
      font-weight: 500;
    }

    .template-select {
      width: 220px;
      height: 30px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--surface);
    }

    .printer-group {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
    }

    .printer {
      height: 30px;
      padding: 0 9px;
      border: 1px solid var(--line);
      border-radius: 4px;
      color: #9aa5b4;
      background: #fafbfd;
      font-size: 12px;
    }

    .printer::before {
      content: "⌁";
      margin-right: 4px;
      color: #a7b0be;
    }

    .detect-btn {
      min-height: 30px;
      height: 30px;
      padding: 0 10px;
      font-size: 12px;
    }

    .printer-warning {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 9px 20px;
      border-top: 1px solid var(--line);
      color: var(--ink);
      background: #fffae6;
      font-size: 12px;
    }

    .warning-icon {
      color: #ff8b00;
      font-weight: 800;
    }

    .printer-warning strong {
      display: block;
      margin-bottom: 2px;
      font-weight: 500;
    }

    .printer-warning span {
      color: var(--muted);
    }

    .preview-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 20px;
      border-top: 1px solid var(--line);
      background: linear-gradient(90deg, #fafbfc, #fff);
    }

    .preview-actions-left,
    .preview-actions-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .preview-total {
      color: var(--muted);
      font-size: 12px;
    }

    .preview-total strong { color: var(--ink); }

    .top-actions > .btn:not(.icon-only),
    .top-actions .mode-switch button {
      min-height: 28px;
      height: 28px;
      font-size: 12px;
    }

    .footer .btn,
    .preview-actions .btn {
      min-height: 32px;
      height: 32px;
      font-size: 14px;
    }

    .btn-print {
      border-color: #36b37e;
      color: #fff;
      background: #36b37e;
    }

    .footer-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toast {
      position: fixed;
      right: 24px;
      bottom: 78px;
      z-index: 10;
      max-width: 360px;
      padding: 12px 16px;
      border: 1px solid #b8ddcf;
      border-radius: 5px;
      color: #076646;
      background: #edfaf5;
      box-shadow: 0 8px 24px rgba(20, 43, 77, 0.15);
      opacity: 0;
      pointer-events: none;
      transform: translateY(8px);
      transition: 0.2s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 900px) {
      .app {
        grid-template-rows: auto auto auto auto;
        overflow-y: auto;
      }

      .topbar, .stepbar, .footer {
        align-items: flex-start;
        flex-direction: column;
        padding: 12px;
      }

      .workspace { grid-template-columns: 1fr; }
      .sidebar { border-right: 0; border-bottom: 1px solid var(--line); }
      .material-list { max-height: 480px; }
      .content { min-height: 640px; }
      .selected-material { grid-template-columns: 90px minmax(0, 1fr) 100px 32px; }
      .footer-info, .footer-actions, .printer-group { flex-wrap: wrap; }
      .app.preview-mode { grid-template-rows: auto auto minmax(420px, 1fr) auto; }
      .preview-actions { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="dialog-backdrop">
    <main class="app" id="app" role="dialog" aria-modal="true" aria-labelledby="dialogTitle">
    <header class="topbar">
      <div class="brand">
        <div class="brand-icon">▥</div>
        <div>
          <h1 id="dialogTitle">入库标签打印</h1>
          <p id="subtitle">入库单 RK-202606-0091 · 一物一标 · 默认打印待打印数量</p>
        </div>
      </div>
      <div class="top-actions">
        <div class="entry-switch" aria-label="打印入口">
          <button class="active" type="button" data-entry="detail">详情页打印</button>
          <button type="button" data-entry="batch">列表批量打印</button>
        </div>
        <button class="btn" id="printRecords" type="button">↶ 打印记录</button>
        <div class="mode-switch" aria-label="条码类型">
          <button class="active" type="button" data-mode="barcode">▥ 条形码</button>
          <button type="button" data-mode="qrcode">▦ 二维码</button>
        </div>
        <button class="btn btn-quiet icon-only" type="button" aria-label="关闭">×</button>
      </div>
    </header>

    <section class="stepbar">
      <div class="steps">
        <button class="step active" id="selectStep" type="button">1　选择物料</button>
        <span class="arrow">→</span>
        <button class="step" id="previewStep" type="button">2　预览打印</button>
      </div>
      <div class="selection-summary">
        已选 <strong id="selectedKinds">2</strong> 种 / 共 <strong id="selectedLabels">4</strong> 张
        <button class="btn btn-quiet text-danger selection-only" id="clearAll" type="button">清空</button>
      </div>
    </section>

    <section class="workspace">
      <aside class="sidebar">
        <div class="source-head" id="sourceHead"></div>

        <div class="sidebar-tools selection-only">
          <input class="search" id="search" type="search" placeholder="搜索入库单、物料编码或名称">
          <button class="btn" id="selectAll" type="button">全选</button>
        </div>

        <div class="material-list" id="materialList"></div>
      </aside>

      <section class="content">
        <div class="content-toolbar">
          <div class="toolbar-group selection-only">
            <span class="toolbar-label">标签尺寸：</span>
            <button class="size-btn" type="button">40×30mm</button>
            <button class="size-btn active" type="button">50×30mm</button>
            <button class="size-btn" type="button">60×40mm</button>
            <button class="size-btn" type="button">70×50mm</button>
            <button class="size-btn" type="button">80×60mm</button>
          </div>
          <div class="preview-summary preview-only">
            <strong>模板: <span id="previewTemplateName">标准物料标签</span></strong>
            <span class="divider">|</span>
            <span>尺寸: <span id="previewSize">50×30mm</span></span>
            <span class="divider">|</span>
            <span>共 <strong id="previewToolbarCount">4</strong> 张</span>
          </div>
          <div class="zoom preview-only">
            <span>缩放</span>
            <button class="btn icon-only" id="zoomOut" type="button">−</button>
            <strong id="zoomValue">100%</strong>
            <button class="btn icon-only" id="zoomIn" type="button">＋</button>
            <button class="btn icon-only" id="zoomReset" type="button">↶</button>
          </div>
        </div>

        <div class="canvas">
          <div class="selection-panel selection-only">
            <div class="panel-head">
              <h2>待打印物料</h2>
              <span class="selection-summary">打印数量默认取“本次入库 − 已打印”</span>
            </div>
            <div id="selectedMaterialList"></div>
          </div>
          <div class="preview-grid preview-only" id="previewGrid"></div>
        </div>
      </section>
    </section>

    <footer class="footer selection-only">
      <div class="footer-info">
        <strong>▧ 共 <span id="footerKinds">2</span> 种物料 / <span id="footerLabels">4</span> 张标签</strong>
      </div>
      <div class="footer-actions">
        <button class="btn btn-primary" id="goPreview" type="button">◉ 预览标签</button>
      </div>
    </footer>

    <section class="preview-footer preview-only">
      <div class="preview-config">
        <div class="config-group">
          <span class="config-label">▧ 条码模板:</span>
          <select class="template-select" id="templateSelect">
            <option>标准物料标签（50×30mm）</option>
            <option>仓库简洁标签（50×30mm）</option>
            <option>批次追溯标签（60×40mm）</option>
          </select>
        </div>
        <span class="config-divider"></span>
        <div class="channel-group">
          <span class="config-label">♧ 打印通道:</span>
          <div class="printer-group">
            <button class="printer" type="button" disabled>佳博打印服务</button>
            <button class="printer" type="button" disabled>TSC 打印服务</button>
            <button class="printer" type="button" disabled>汉印打印服务</button>
            <button class="printer" type="button" disabled>得力打印服务</button>
            <button class="printer" type="button" disabled>芯烨打印服务</button>
            <button class="printer" type="button" disabled>Zebra Browser Print</button>
            <button class="printer" type="button" disabled>USB 直连</button>
          </div>
          <button class="btn detect-btn" id="detectPrinter" type="button">↻ 重新检测</button>
        </div>
      </div>
      <div class="printer-warning">
        <span class="warning-icon">⌁</span>
        <div>
          <strong>请先连接打印机</strong>
          <span>启动本地打印服务或连接 USB 打印机，支持 Zebra / TSC / 佳博 / 芯烨 / 汉印等主流标签打印机</span>
        </div>
      </div>
      <div class="preview-actions">
        <div class="preview-actions-left">
          <button class="btn" id="backToSelect" type="button">← 返回修改</button>
          <span class="preview-total">▧ 总计 <strong id="previewFooterKinds">2</strong> 种物料 / <strong id="previewFooterLabels">4</strong> 张标签</span>
        </div>
        <div class="preview-actions-right">
          <button class="btn" id="cancelPreview" type="button">取消</button>
          <button class="btn btn-print" id="printNow" type="button">▣ 确认打印 <span id="printCount">4</span> 张</button>
        </div>
      </div>
    </section>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const materials = [
      {
        id: "m1",
        orderNo: "RK-202606-0091",
        name: "明纬电源12142241",
        code: "202605明纬VD0003",
        spec: "标准版 / NDR-480igal-24",
        batch: "B260612-00014",
        received: 5,
        printed: 2,
        selected: true,
        printQty: 3,
        barcode: "44444444453SP"
      },
      {
        id: "m2",
        orderNo: "RK-202606-0091",
        name: "前端自测-0519-003",
        code: "2026SP00791",
        spec: "10 / 15 · 型号23",
        batch: "B260612-00014",
        received: 1,
        printed: 0,
        selected: true,
        printQty: 1,
        barcode: "2026SP00791"
      },
      {
        id: "m3",
        orderNo: "RK-202606-0089",
        name: "导入临时物料1",
        code: "6ES7516-3AN02-0AB0",
        spec: "标准版 / PLC模块",
        batch: "B260612-00013",
        received: 10,
        printed: 0,
        selected: false,
        printQty: 10,
        barcode: "44444444453SP"
      },
      {
        id: "m4",
        orderNo: "RK-202606-0088",
        name: "工业交换机8口",
        code: "2026SW00018",
        spec: "千兆非网管型",
        batch: "B260612-00012",
        received: 4,
        printed: 1,
        selected: false,
        printQty: 3,
        barcode: "2026SW00018"
      }
    ];

    const orders = [
      { no: "RK-202606-0091", warehouse: "合肥仓库", date: "2026-06-12", selected: true },
      { no: "RK-202606-0089", warehouse: "合肥仓库", date: "2026-06-12", selected: false },
      { no: "RK-202606-0088", warehouse: "合肥仓库", date: "2026-06-12", selected: false }
    ];

    const app = document.getElementById("app");
    const materialList = document.getElementById("materialList");
    const selectedMaterialList = document.getElementById("selectedMaterialList");
    const previewGrid = document.getElementById("previewGrid");
    const toast = document.getElementById("toast");
    let searchKeyword = "";
    let zoom = 1;
    let codeMode = "barcode";
    let entryMode = "detail";

    function moneylessNumber(value) {
      return Math.max(0, Math.floor(Number(value) || 0));
    }

    function activeMaterials() {
      if (entryMode === "detail") {
        return materials.filter(item => item.orderNo === "RK-202606-0091");
      }
      const selectedOrders = orders.filter(order => order.selected).map(order => order.no);
      return materials.filter(item => selectedOrders.includes(item.orderNo));
    }

    function selectedMaterials() {
      return activeMaterials().filter(item => item.selected);
    }

    function labelTotal() {
      return selectedMaterials().reduce((sum, item) => sum + item.printQty, 0);
    }

    function showToast(message, error = false) {
      toast.textContent = message;
      toast.style.color = error ? "#a42b1f" : "";
      toast.style.background = error ? "#fff1ef" : "";
      toast.style.borderColor = error ? "#f1b7b2" : "";
      toast.classList.add("show");
      window.setTimeout(() => toast.classList.remove("show"), 2400);
    }

    function updateSummary() {
      const kinds = selectedMaterials().length;
      const labels = labelTotal();
      const orderCount = entryMode === "detail" ? 1 : orders.filter(order => order.selected).length;
      document.getElementById("selectedKinds").textContent = kinds;
      document.getElementById("selectedLabels").textContent = labels;
      document.getElementById("footerKinds").textContent = kinds;
      document.getElementById("footerLabels").textContent = labels;
      document.getElementById("previewFooterKinds").textContent = kinds;
      document.getElementById("previewFooterLabels").textContent = labels;
      document.getElementById("previewToolbarCount").textContent = labels;
      document.getElementById("printCount").textContent = labels;
      const activeSize = document.querySelector(".size-btn.active").textContent;
      document.getElementById("previewSize").textContent = activeSize;
      document.getElementById("subtitle").textContent = entryMode === "detail"
        ? `入库单 RK-202606-0091 · 预览 ${labels} 张标签 · ${activeSize}`
        : `已选 ${orderCount} 张入库单 · 汇总 ${kinds} 种物料 · 预览 ${labels} 张标签`;
    }

    function renderSourceHead() {
      const sourceHead = document.getElementById("sourceHead");
      if (entryMode === "detail") {
        sourceHead.innerHTML = `
          <div class="source-label">
            <span>当前入库单</span>
            <span class="tag">已入库</span>
          </div>
          <div class="source-card">
            <div class="source-card-top">
              <strong>RK-202606-0091</strong>
              <span>共 2 种 / 6 件</span>
            </div>
            <div class="source-meta">
              <span>批次：B260612-00014</span>
              <span>仓库：合肥仓库</span>
              <span>日期：2026-06-12</span>
            </div>
          </div>
        `;
      } else {
        const selectedOrders = orders.filter(order => order.selected);
        sourceHead.innerHTML = `
          <div class="source-label">
            <span>列表已选入库单</span>
            <span class="tag">${selectedOrders.length} 单</span>
          </div>
          <div class="source-card">
            <div class="source-card-top">
              <strong>批量打印</strong>
              <span>仅汇总勾选单据</span>
            </div>
            <div class="source-meta">
              <span>不同入库单、不同批次不合并</span>
              <span>默认打印各单待打印数量</span>
            </div>
          </div>
        `;
      }
    }

    function renderMaterialList() {
      const keyword = searchKeyword.trim().toLowerCase();
      if (entryMode === "batch") {
        const visibleOrders = orders.filter(order => {
          const orderMaterials = materials.filter(item => item.orderNo === order.no);
          return !keyword || `${order.no}${order.warehouse}${orderMaterials.map(item => `${item.name}${item.code}`).join("")}`
            .toLowerCase().includes(keyword);
        });

        materialList.innerHTML = visibleOrders.map(order => {
          const orderMaterials = materials.filter(item => item.orderNo === order.no);
          const pieces = orderMaterials.reduce((sum, item) => sum + item.received, 0);
          return `
            <article class="order-card ${order.selected ? "selected" : ""}">
              <div class="order-head">
                <input type="checkbox" data-order-check="${order.no}" ${order.selected ? "checked" : ""} aria-label="选择入库单${order.no}">
                <div>
                  <strong>${order.no}</strong>
                  <span>${order.warehouse} · ${order.date}</span>
                </div>
                <span class="order-count">${orderMaterials.length} 种</span>
              </div>
              <div class="order-materials">
                ${orderMaterials.map(item => `
                  <div class="order-material-row">
                    <span>${item.name}<br>${item.code} · ${item.batch}</span>
                    <strong>待打 ${item.received - item.printed}</strong>
                  </div>
                `).join("")}
              </div>
              <div class="material-print">
                <div class="print-rule">共 ${pieces} 件；选择后按每种物料待打印数量导入</div>
                <button class="btn ${order.selected ? "" : "btn-primary"}" type="button" data-import-order="${order.no}">
                  ${order.selected ? "移除" : "导入此单"}
                </button>
              </div>
            </article>
          `;
        }).join("");

        materialList.querySelectorAll("[data-order-check]").forEach(control => {
          control.addEventListener("change", () => {
            const orderNo = control.dataset.orderCheck || control.dataset.importOrder;
            const order = orders.find(row => row.no === orderNo);
            const shouldSelect = control.checked;
            order.selected = shouldSelect;
            materials.filter(item => item.orderNo === orderNo).forEach(item => {
              item.selected = shouldSelect;
              item.printQty = shouldSelect ? item.received - item.printed : item.printQty;
            });
            renderAll();
          });
        });

        materialList.querySelectorAll("[data-import-order]").forEach(control => {
          control.addEventListener("click", () => {
            const orderNo = control.dataset.importOrder;
            const order = orders.find(row => row.no === orderNo);
            const shouldSelect = !order.selected;
            order.selected = shouldSelect;
            materials.filter(item => item.orderNo === orderNo).forEach(item => {
              item.selected = shouldSelect;
              item.printQty = shouldSelect ? item.received - item.printed : item.printQty;
            });
            renderAll();
          });
        });
        return;
      }

      const visible = activeMaterials().filter(item =>
        !keyword || `${item.name}${item.code}${item.spec}`.toLowerCase().includes(keyword)
      );

      materialList.innerHTML = visible.map(item => {
        const remaining = item.received - item.printed;
        return `
          <article class="material-card ${item.selected ? "selected" : ""}">
            <div class="material-main">
              <input type="checkbox" data-check="${item.id}" ${item.selected ? "checked" : ""} aria-label="选择${item.name}">
              <div>
                <div class="material-name">${item.name}</div>
                <div class="material-code">${item.code}<br>${item.spec}<br>批次 ${item.batch}</div>
              </div>
            </div>
            <div class="material-stats">
              <div class="stat"><span>本次入库</span><strong>${item.received}</strong></div>
              <div class="stat"><span>已打印</span><strong>${item.printed}</strong></div>
              <div class="stat"><span>待打印</span><strong class="${remaining ? "" : "text-danger"}">${remaining}</strong></div>
            </div>
            <div class="material-print">
              <div class="print-rule">一物一标：1 件物料生成 1 张标签<br>可分批打印，不能超过待打印数量</div>
              <input class="qty-input" type="number" min="0" max="${remaining}" value="${item.printQty}" data-qty="${item.id}" aria-label="${item.name}打印数量">
            </div>
          </article>
        `;
      }).join("");

      materialList.querySelectorAll("[data-check]").forEach(input => {
        input.addEventListener("change", () => {
          const item = materials.find(row => row.id === input.dataset.check);
          item.selected = input.checked;
          if (item.selected && item.printQty === 0) item.printQty = item.received - item.printed;
          renderAll();
        });
      });

      materialList.querySelectorAll("[data-qty]").forEach(input => {
        input.addEventListener("input", () => {
          const item = materials.find(row => row.id === input.dataset.qty);
          const remaining = item.received - item.printed;
          item.printQty = Math.min(moneylessNumber(input.value), remaining);
          item.selected = item.printQty > 0;
          renderAll();
        });
      });
    }

    function renderSelectedMaterials() {
      const selected = selectedMaterials();
      if (!selected.length) {
        selectedMaterialList.innerHTML = `<div class="empty">尚未选择物料，请从左侧选择本次需要打印标签的物料。</div>`;
        return;
      }

      selectedMaterialList.innerHTML = selected.map(item => `
        <div class="selected-material">
          <div class="mini-label"><div class="barcode" data-code="${item.barcode}"></div></div>
          <div class="selected-name">
            <strong>${item.name}</strong>
            <span>${item.code} | ${item.spec}</span>
            <span>${item.barcode}</span>
          </div>
          <input type="number" min="1" max="${item.received - item.printed}" value="${item.printQty}" data-selected-qty="${item.id}" aria-label="${item.name}本次打印张数">
          <button class="remove" type="button" data-remove="${item.id}" aria-label="移除${item.name}">⌫</button>
        </div>
      `).join("");

      selectedMaterialList.querySelectorAll("[data-selected-qty]").forEach(input => {
        input.addEventListener("input", () => {
          const item = materials.find(row => row.id === input.dataset.selectedQty);
          item.printQty = Math.min(moneylessNumber(input.value), item.received - item.printed);
          if (item.printQty === 0) item.selected = false;
          renderAll();
        });
      });

      selectedMaterialList.querySelectorAll("[data-remove]").forEach(button => {
        button.addEventListener("click", () => {
          const item = materials.find(row => row.id === button.dataset.remove);
          item.selected = false;
          renderAll();
        });
      });
    }

    function renderPreview() {
      const labels = [];
      selectedMaterials().forEach(item => {
        for (let index = 1; index <= item.printQty; index += 1) {
          labels.push(`
            <article class="label-card">
              <div class="label-name">${item.name}</div>
              <div class="qr label-qr"></div>
              <div class="barcode label-barcode" data-code="${item.barcode}"></div>
              <div class="label-unit">件</div>
              <div class="label-extra">${item.code} · 批次 ${item.batch} · ${index}/${item.printQty}</div>
            </article>
          `);
        }
      });
      previewGrid.innerHTML = labels.join("") || `<div class="empty">没有可预览的标签</div>`;
      previewGrid.style.transform = `scale(${zoom})`;
      updateSummary();
    }

    function renderAll() {
      renderSourceHead();
      renderMaterialList();
      renderSelectedMaterials();
      renderPreview();
      updateSummary();
    }

    function enterPreview() {
      if (!selectedMaterials().length || labelTotal() === 0) {
        showToast("请至少选择一个物料并填写打印数量。", true);
        return;
      }
      app.classList.add("preview-mode");
      document.getElementById("selectStep").className = "step done";
      document.getElementById("previewStep").className = "step active";
      renderPreview();
    }

    function exitPreview() {
      app.classList.remove("preview-mode");
      document.getElementById("selectStep").className = "step active";
      document.getElementById("previewStep").className = "step";
    }

    document.getElementById("search").addEventListener("input", event => {
      searchKeyword = event.target.value;
      renderMaterialList();
    });

    document.getElementById("selectAll").addEventListener("click", () => {
      if (entryMode === "batch") {
        orders.forEach(order => { order.selected = true; });
      }
      activeMaterials().forEach(item => {
        item.selected = true;
        item.printQty = item.received - item.printed;
      });
      renderAll();
    });

    document.getElementById("clearAll").addEventListener("click", () => {
      if (entryMode === "batch") {
        orders.forEach(order => { order.selected = false; });
      }
      materials.forEach(item => { item.selected = false; });
      renderAll();
    });

    document.querySelectorAll("[data-entry]").forEach(button => {
      button.addEventListener("click", () => {
        entryMode = button.dataset.entry;
        document.querySelectorAll("[data-entry]").forEach(item => item.classList.toggle("active", item === button));
        orders.forEach(order => { order.selected = order.no === "RK-202606-0091"; });
        materials.forEach(item => {
          item.selected = item.orderNo === "RK-202606-0091";
          item.printQty = item.received - item.printed;
        });
        searchKeyword = "";
        document.getElementById("search").value = "";
        exitPreview();
        renderAll();
      });
    });

    document.getElementById("goPreview").addEventListener("click", enterPreview);
    document.getElementById("previewStep").addEventListener("click", enterPreview);
    document.getElementById("backToSelect").addEventListener("click", exitPreview);
    document.getElementById("cancelPreview").addEventListener("click", exitPreview);
    document.getElementById("selectStep").addEventListener("click", exitPreview);

    document.querySelectorAll(".size-btn").forEach(button => {
      button.addEventListener("click", () => {
        document.querySelectorAll(".size-btn").forEach(item => item.classList.toggle("active", item === button));
        updateSummary();
      });
    });

    document.querySelectorAll("[data-mode]").forEach(button => {
      button.addEventListener("click", () => {
        codeMode = button.dataset.mode;
        document.querySelectorAll("[data-mode]").forEach(item => item.classList.toggle("active", item === button));
        renderPreview();
      });
    });

    document.getElementById("templateSelect").addEventListener("change", event => {
      const optionText = event.target.value;
      document.getElementById("previewTemplateName").textContent = optionText.split("（")[0];
      const sizeMatch = optionText.match(/（(.+?)）/);
      if (sizeMatch) document.getElementById("previewSize").textContent = sizeMatch[1];
    });

    document.getElementById("zoomOut").addEventListener("click", () => {
      zoom = Math.max(0.7, zoom - 0.1);
      document.getElementById("zoomValue").textContent = `${Math.round(zoom * 100)}%`;
      renderPreview();
    });

    document.getElementById("zoomIn").addEventListener("click", () => {
      zoom = Math.min(1.6, zoom + 0.1);
      document.getElementById("zoomValue").textContent = `${Math.round(zoom * 100)}%`;
      renderPreview();
    });

    document.getElementById("zoomReset").addEventListener("click", () => {
      zoom = 1;
      document.getElementById("zoomValue").textContent = "100%";
      renderPreview();
    });

    document.getElementById("printRecords").addEventListener("click", () => {
      showToast("打印记录：本入库单已打印 2 张，最近打印时间 2026-06-12 14:42。");
    });

    document.getElementById("detectPrinter").addEventListener("click", () => {
      showToast("检测完成：未发现本地打印服务，请确认打印服务已启动。", true);
    });

    document.getElementById("printNow").addEventListener("click", () => {
      showToast(`已创建 ${labelTotal()} 张标签的打印任务。`);
    });

    renderAll();
  </script>
</body>
</html>
